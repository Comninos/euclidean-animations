<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euclid's Elements, Animated</title>
  <style>
    :root {
      --paper: #FFFCF0;
      --ink: #100F0F;
      --red: #C03E35;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }
    header {
      padding: 2.5rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid var(--ink);
    }
    header h1 {
      margin: 0 0 0.4rem;
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 0;
      font-style: italic;
      opacity: 0.75;
      max-width: 46em;
      margin-inline: auto;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 2.5rem;
    }
    figure {
      margin: 0;
      border: 1px solid rgba(13,12,12,0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    figcaption {
      padding: 0.9rem 1.1rem 0.4rem;
      font-size: 1.05rem;
    }
    figcaption .id {
      display: inline-block;
      font-family: system-ui, sans-serif;
      font-style: normal;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--red);
      border: 1px solid var(--red);
      border-radius: 3px;
      padding: 0.05rem 0.4rem;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    euclid-player {
      display: block;
      margin: 0 1.1rem 1.1rem;
      width: calc(100% - 2.2rem);
    }
    footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      opacity: 0.65;
    }
    code {
      background: rgba(13,12,12,0.06);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Euclid's Elements, Animated</h1>
    <p>
      Each proposition constructed step by step, in thin platonic lines, straight from a
      declarative description of the construction. The current step is picked out in red.
    </p>
  </header>
  <main id="gallery">
    <figure>
      <figcaption><span class="id">I.1</span>On a given finite straight line to construct an equilateral triangle.</figcaption>
      <euclid-player src="propositions/I.1.json"></euclid-player>
    </figure>
    <figure>
      <figcaption><span class="id">I.2</span>From a given point to draw a straight line equal to a given straight line.</figcaption>
      <euclid-player src="propositions/I.2.json"></euclid-player>
    </figure>
    <figure>
      <figcaption><span class="id">I.3</span>To cut off from the greater of two given unequal straight lines a part equal to the lesser.</figcaption>
      <euclid-player src="propositions/I.3.json"></euclid-player>
    </figure>
    <figure>
      <figcaption><span class="id">I.9</span>To bisect a given rectilineal angle.</figcaption>
      <euclid-player src="propositions/I.9.json"></euclid-player>
    </figure>
  </main>
  <footer>
    Embed any proposition standalone with <code>viewer.html?prop=I.1</code> in an <code>&lt;iframe&gt;</code>.
  </footer>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
