<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euclid Viewer</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #FFFCF0;
    }
    body.dark {
      background: #100F0F;
      color: #CECDC3;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      font-family: Georgia, 'Times New Roman', serif;
      color: #100F0F;
    }
    euclid-player {
      flex: 1;
      width: 100%;
      border: none;
      border-radius: 0;
    }
    euclid-player[hidden] { display: none; }
    .missing {
      margin: auto;
      padding: 2rem;
      text-align: center;
      font-style: italic;
    }
    .missing a { color: inherit; }
    .missing code {
      font-family: system-ui, sans-serif;
      font-style: normal;
      background: rgba(128,128,128,0.15);
      padding: 0.1em 0.4em;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <euclid-player id="player" fill hidden></euclid-player>
  <div id="missing" class="missing" hidden>
    <p>Specify a proposition with <code>?prop=I.1</code> in the URL.</p>
    <p>
      Try <a href="viewer.html?prop=I.1">Proposition I.1</a> ·
      <a href="viewer.html?prop=I.2">Proposition I.2</a> ·
      <a href="viewer.html?prop=I.3">Proposition I.3</a> ·
      <a href="viewer.html?prop=I.4">Proposition I.4</a> ·
      <a href="viewer.html?prop=I.5">Proposition I.5</a> ·
      <a href="viewer.html?prop=I.6">Proposition I.6</a> ·
      <a href="viewer.html?prop=I.9">Proposition I.9</a> ·
      or browse the <a href="index.html">gallery</a>.
    </p>
  </div>
  <script>
    // Classic script: runs during parse, before the module below, so the
    // element already carries its src/theme when the custom element upgrades
    // (also avoids a light-theme flash when ?theme=dark).
    (function () {
      var params = new URLSearchParams(window.location.search);
      var player = document.getElementById('player');

      var prop = params.get('prop');
      if (prop && /^[A-Za-z0-9._-]+$/.test(prop)) {
        player.setAttribute('src', 'propositions/' + prop + '.json');
        player.hidden = false;
        document.title = 'Euclid ' + prop;
      } else {
        document.getElementById('missing').hidden = false;
      }

      // Keep the page (letterbox/missing-page) in step with the player's
      // theme. The variables only resolve once the custom element has
      // upgraded and installed its stylesheet, hence the whenDefined hook.
      function syncPageColors() {
        var style = getComputedStyle(player);
        var bg = style.getPropertyValue('--euclid-background').trim();
        var ink = style.getPropertyValue('--euclid-black').trim();
        if (bg) document.body.style.background = bg;
        if (ink) document.body.style.color = ink;
      }
      customElements.whenDefined('euclid-player').then(syncPageColors);

      function applyTheme(theme) {
        // Only 'dark' is a real theme attribute; 'light' or anything
        // invalid means the default (no attribute).
        var dark = theme === 'dark';
        if (typeof theme === 'string' && theme !== 'light' && /^[a-z][a-z0-9-]*$/i.test(theme)) {
          player.setAttribute('theme', theme);
        } else {
          player.removeAttribute('theme');
        }
        // The body class paints the right ground immediately, before the
        // custom element upgrades — otherwise dark embeds flash light for
        // the first few frames of a load.
        document.body.classList.toggle('dark', dark);
        // Remember the theme so the next load paints correctly from the
        // first frame even when theming comes from postMessage (which
        // necessarily arrives after first paint). May throw in iframes
        // with third-party storage blocked; the class above still works.
        try { localStorage.setItem('euclid-theme', dark ? 'dark' : 'light'); } catch (e) {}
        syncPageColors();
      }

      // Align the player's title/caption with the embedding page's text
      // column: the parent measures the pixel inset and sends it (see the
      // publish.js snippet in the README).
      function applyInset(inset) {
        if (typeof inset !== 'number' || !isFinite(inset) || inset < 0 || inset > 400) return;
        player.style.setProperty('--euclid-text-inset', Math.round(inset) + 'px');
        if (typeof player.refreshLayout === 'function') player.refreshLayout();
        window.dispatchEvent(new Event('resize')); // re-report euclid-size
      }

      // Exact page-color match: ?bg=%23202020 (any CSS hex; # optional).
      function applyBg(bg) {
        if (!/^#?[0-9a-fA-F]{3,8}$/.test(bg)) return;
        var color = bg.charAt(0) === '#' ? bg : '#' + bg;
        document.body.style.background = color;
        player.style.setProperty('--euclid-background', color);
      }

      // Static theming via URL: ?theme=dark, ?bg=%23<hex>, ?inset=<px>.
      // With no ?theme param, fall back to the theme remembered from the
      // last visit so relay-driven embeds don't flash the wrong ground.
      var initialTheme = params.get('theme');
      if (initialTheme === null) {
        try { initialTheme = localStorage.getItem('euclid-theme'); } catch (e) {}
      }
      applyTheme(initialTheme);
      var bg = params.get('bg');
      if (bg) applyBg(bg);
      var inset = parseFloat(params.get('inset'));
      if (!isNaN(inset)) applyInset(inset);

      // Live theming from the embedding page (e.g. Obsidian's light/dark
      // toggle, relayed by publish.js — see README):
      //   frame.contentWindow.postMessage(
      //     { type: 'euclid-theme', theme: 'dark', bg: '#1e1e1e' }, '*')
      window.addEventListener('message', function (e) {
        var d = e.data;
        if (!d || d.type !== 'euclid-theme') return;
        if (typeof d.theme === 'string') applyTheme(d.theme);
        if (typeof d.bg === 'string') applyBg(d.bg);
        if (typeof d.inset === 'number') applyInset(d.inset);
      });

      // Tell the parent we're ready to be themed, so it can answer with the
      // current theme without polling (covers the load-order race).
      if (window.parent !== window) {
        window.addEventListener('load', function () {
          window.parent.postMessage({ type: 'euclid-ready' }, '*');
        });

        // Auto-height: report the ideal iframe height for our current
        // width — the stage at its natural aspect plus the fixed chrome
        // (title/caption/controls) — so the embedding page can size the
        // iframe to show the geometry as large as the width allows
        // (see the euclid-size listener in the README's publish.js).
        // Depends only on width, so no resize feedback loop.
        var sizeTimer = null;
        function reportSize() {
          var sr = player.shadowRoot;
          if (!sr) return;
          var aspect = parseFloat(getComputedStyle(player).getPropertyValue('--euclid-aspect'));
          var stage = sr.querySelector('.stage-wrap');
          if (!aspect || !stage) return;
          var chrome = player.getBoundingClientRect().height - stage.getBoundingClientRect().height;
          var height = Math.round(window.innerWidth / aspect + chrome);
          window.parent.postMessage({ type: 'euclid-size', height: height }, '*');
        }
        function reportSizeSoon() {
          clearTimeout(sizeTimer);
          // Small delay lets the caption-height measurement settle first.
          sizeTimer = setTimeout(reportSize, 80);
        }
        // First euclid-step fires once the proposition has mounted.
        player.addEventListener('euclid-step', reportSizeSoon, { once: true });
        window.addEventListener('resize', reportSizeSoon);
      }
    })();
  </script>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
